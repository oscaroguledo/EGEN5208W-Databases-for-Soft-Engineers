version: '3.8'

services:
  # Frontend Service (Development or Production)
  frontend:
    build:
      context: ./app/frontend
      dockerfile: ${DOCKERFILE:-Dockerfile}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./app/frontend/src:/app/src
      - ./app/frontend/public:/app/public
      - ./app/frontend/index.html:/app/index.html
      - ./app/frontend/package.json:/app/package.json
      - ./app/frontend/tailwind.config.js:/app/tailwind.config.js
      - ./app/frontend/vite.config.ts:/app/vite.config.ts
      - ./app/frontend/tsconfig.json:/app/tsconfig.json
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - gym-network
    profiles:
      - frontend
      - dev
      - prod

  # Backend Service (Development or Production)
  backend:
    build:
      context: ./app/backend
      dockerfile: ${DOCKERFILE:-Dockerfile}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./app/backend/src:/app/src
      - ./app/backend/requirements.txt:/app/requirements.txt
    environment:
      - PYTHONPATH=/app/src
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gym_user}:${POSTGRES_PASSWORD:-gym_password}@postgres:5432/${POSTGRES_DB:-gym_db}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gym-network
    profiles:
      - backend
      - dev
      - prod

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-gym_db}
      - POSTGRES_USER=${POSTGRES_USER:-gym_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-gym_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gym-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gym_user} -d ${POSTGRES_DB:-gym_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres
      - dev
      - prod

  # Production Frontend (Nginx)
  frontend-prod:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - gym-network
    profiles:
      - prod

volumes:
  postgres_data:

networks:
  gym-network:
    driver: bridge
