version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:13
    container_name: gym_db
    environment:
      POSTGRES_DB: gym_db
      POSTGRES_USER: gym_user
      POSTGRES_PASSWORD: gym_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../sql/DDL.sql:/docker-entrypoint-initdb.d/1-ddl.sql
      - ../../sql/DML.sql:/docker-entrypoint-initdb.d/2-dml.sql
    networks:
      - gym_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_user -d gym_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gym_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://gym_user:gym_password@db:5432/gym_db
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gym_network
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # Frontend (React/Vue/Angular - adjust as needed)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gym_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      # Or for Vue:
      # VUE_APP_API_URL: http://localhost:8000
      # Or for Angular:
      # API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - gym_network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  gym_network:
    driver: bridge